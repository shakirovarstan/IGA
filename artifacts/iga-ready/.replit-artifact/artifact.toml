kind = "web"
previewPath = "/"
title = "IGA-Ready"
version = "1.0.0"
id = "artifacts/iga-ready"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23028

[services.development]
run = "pnpm --filter @workspace/iga-ready run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iga-ready", "run", "build" ]
publicDir = "artifacts/iga-ready/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23028"
BASE_PATH = "/"
